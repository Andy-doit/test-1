version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./hotstock-be-v1/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      # Expose externally for tools/scripts if needed, internally mapped as postgres:5432
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass password
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    build:
      context: ./hotstock-be-v1
      dockerfile: Dockerfile
    env_file:
      - ./hotstock-be-v1/.env
    environment:
      NODE_ENV: production
      PORT: 3001
      API_PREFIX: api/v1
      APP_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      DATABASE_URL: postgresql://postgres:password@postgres:5432/appdb?schema=public
      DIRECT_URL: postgresql://postgres:password@postgres:5432/appdb?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: password
      JWT_ACCESS_SECRET: your-access-secret-min-32-chars-!
      JWT_REFRESH_SECRET: your-refresh-secret-min-32-chars-!
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      THROTTLE_TTL: 60000
      THROTTLE_LIMIT: 100
      SEED_ADMIN_PASSWORD: change-me-immediately
      AWS_S3_BUCKET: dummy-bucket
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3001/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./hotstock
      dockerfile: dockerfile
      args:
        BACKEND_URL: http://backend:3001
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:3001
      NEXT_PUBLIC_API_URL: /api/v1
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    extra_hosts:
      - "localhost:host-gateway"
    volumes:
      - uploads_data:/app/public/uploads
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:

networks:
  app-network:
    driver: bridge